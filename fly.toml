app = "stock-project"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

  # If backend + quote service run in the SAME machine:
  BACKEND_INTERNAL_URL = "http://0.0.0.0:4000"
  STOCK_QUOTE_SERVICE_URL = "http://0.0.0.0:8001"

  # If they are SEPARATE Fly apps, replace with:
  # BACKEND_INTERNAL_URL = "https://backend-app-name.fly.dev"
  # STOCK_QUOTE_SERVICE_URL = "https://quote-service-app-name.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    soft_limit = 20
    hard_limit = 25

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/"          # FIXED: must be a real route your app serves
    timeout = "5s"
