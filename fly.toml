# fly.toml app configuration file generated for trilliumfinance on 2026-05-09T06:14:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trilliumfinance'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

release_command = "npm --workspace backend exec -- prisma migrate deploy --schema backend/prisma/schema.prisma"

[env]
  NODE_ENV = "production"
  BACKEND_HOST = "127.0.0.1"
  BACKEND_INTERNAL_URL = "http://127.0.0.1:4000"
  STOCK_QUOTE_SERVICE_URL = "http://127.0.0.1:8001"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "30s"
    interval = '15s'
    timeout = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
